function:
  name: CompletarParadaFalloFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Registra un fallo real de retiro para la parada Gammavet exacta indicada por
    route_stop_id y pickup_order_id. Usar solo cuando el conductor informa que no pudo retirar.
  timeout: 300
  memory_size: 256

  layers:
    - foundationMinimal
    - foundationApi

  data:
    writes:
      - table: gammavet_test.route_stops
        mode: update
        columns: [status, observations, updated_at]
      - table: gammavet_test.pickup_orders
        mode: update
        columns: [status, completed, failure_reason, observations, updated_at]
      - table: gammavet_test.dispatch_events
        mode: insert
        columns: [event_type, actor_lambda, route_stop_id, pickup_order_id, metadata]
    reads:
      - table: gammavet_test.route_stops
        columns: [id, pickup_order_id, status, driver_id]
      - table: gammavet_test.routes
        columns: [id, driver_id]
      - table: gammavet_test.drivers
        columns: [id, phone, normalized_phone]
    rpc:
      - POST /api/gammavet/route-stops/fail-current

  parameters:
    required:
      - name: nota
        type: string
        description: Motivo real del fallo informado por el conductor.
    optional:
      - name: route_stop_id
        type: string
        description: UUID de la parada especifica que fallo.
      - name: pickup_order_id
        type: string
        description: UUID de la orden de retiro asociada, para validar la parada exacta.
      - name: driver_id
        type: string
        description: UUID del conductor, si esta disponible.
      - name: driver_phone
        type: string
        description: Telefono del conductor, si esta disponible.
      - name: ticket_id
        type: string
        description: UUID de la sesion o ticket de orquestacion.

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false
