function:
  name: CompletarParadaFalloFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Registra un fallo real de retiro para la parada Gammavet exacta indicada por
    route_stop_id y pickup_order_id. Usar solo cuando el conductor informa que no pudo retirar.
  timeout: 300
  memory_size: 256

  layers:
    - foundationMinimal
    - foundationApi

  data:
    writes:
      - table: gammavet_test.route_stops
        mode: update
        columns: [status, actual_arrival_at, observations, updated_at]
      - table: gammavet_test.pickup_orders
        mode: update
        columns: [status, completed, picked_up_at, response_seconds, failure_reason, observations, updated_at]
      - table: gammavet_test.dispatch_events
        mode: insert
        columns: [event_type, actor_lambda, driver_id, pickup_order_id, route_id, route_stop_id, orchestration_event_uuid, metadata]
    reads:
      - table: gammavet_test.route_stops
        columns: [id, route_id, pickup_order_id, stop_number, queue_position, clinic_id, clinic_name_snapshot, address_snapshot, comuna_snapshot, zone_snapshot, maps_url_snapshot, observations, estimated_arrival_at, started_at, actual_arrival_at, status, ticket_id, source_spreadsheet_id, source_sheet_name, source_sheet_row, created_at, updated_at]
      - table: gammavet_test.routes
        columns: [id, driver_id, route_date, route_code, driver_name_snapshot]
      - table: gammavet_test.drivers
        columns: [id, phone, normalized_phone]
      - table: gammavet_test.pickup_orders
        columns: [id, requested_at, picked_up_at, response_seconds, observations, failure_reason]
    rpc:
      - POST /api/gammavet/route-stops/fail-current

  parameters:
    required:
      - name: nota
        type: string
        description: Motivo real del fallo informado por el conductor.
    optional:
      - name: route_stop_id
        type: string
        description: UUID de la parada especifica que fallo.
      - name: pickup_order_id
        type: string
        description: UUID de la orden de retiro asociada, para validar la parada exacta.
      - name: driver_id
        type: string
        description: UUID del conductor, si esta disponible.
      - name: driver_phone
        type: string
        description: Telefono del conductor, si esta disponible.
      - name: ticket_id
        type: string
        description: UUID de la sesion o ticket de orquestacion.

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false
